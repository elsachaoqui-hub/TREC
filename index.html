<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠電取得憑證及排碳效益歸屬分析 - 簡報</title>
    <style>
        /* 主頁面樣式 */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            scroll-behavior: smooth;
            font-family: sans-serif;
        }

        /* 每一頁的容器 */
        .page-section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            border-bottom: 2px solid #ddd;
        }

        /* 修正原本 1280x720 檔案在滿版網頁下的顯示 */
        .slide-frame {
            width: 1280px;
            height: 720px;
            border: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            background: white;
        }

        /* 右側導覽導覽點 */
        .nav-menu {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 15px 10px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            margin: 15px 0;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
        }

        .nav-dot:hover, .nav-dot.active {
            opacity: 1;
            transform: scale(1.3);
            background: #00875A;
        }
    </style>
</head>
<body>

    <nav class="nav-menu">
        <div class="nav-dot" onclick="scrollToPage(0)" title="途徑概覽"></div>
        <div class="nav-dot" onclick="scrollToPage(1)" title="比較分析"></div>
        </nav>

    <section class="page-section">
        <iframe src="T1.html" class="slide-frame"></iframe>
    </section>

    <section class="page-section">
        <iframe src="T2.html" class="slide-frame"></iframe>
    </section>

    <script>
        function scrollToPage(index) {
            const sections = document.querySelectorAll('.page-section');
            sections[index].scrollIntoView({ behavior: 'smooth' });
        }

        // 自動更新導覽點狀態
        window.addEventListener('scroll', () => {
            const sections = document.querySelectorAll('.page-section');
            const dots = document.querySelectorAll('.nav-dot');
            let current = 0;
            sections.forEach((section, i) => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 200) {
                    current = i;
                }
            });
            dots.forEach(dot => dot.classList.remove('active'));
            if(dots[current]) dots[current].classList.add('active');
        });
    </script>
</body>
</html>
